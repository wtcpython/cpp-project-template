name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run compile

      - name: Package extension
        run: npx @vscode/vsce package

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: "*.vsix"
